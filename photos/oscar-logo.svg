<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-labelledby="title desc">
  <title id="title">Oscar logo mark</title>
  <desc id="desc">A black manufacturing gear, a golden chick-inspired arc, and a red OH monogram for Oscar.</desc>
  <defs>
    <linearGradient id="gearFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd55a"/>
      <stop offset="55%" stop-color="#f4ae18"/>
      <stop offset="100%" stop-color="#d78906"/>
    </linearGradient>
    <linearGradient id="redFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8191d"/>
      <stop offset="100%" stop-color="#980d14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111111" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <g transform="translate(48 28)">
      <g fill="url(#gearFill)">
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(8 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(32 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(56 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(80 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(104 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(128 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(152 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(176 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(200 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(224 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(248 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(272 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(296 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(320 258 175)"/>
        <rect x="245" y="0" width="26" height="48" rx="4" transform="rotate(344 258 175)"/>
        <circle cx="258" cy="175" r="128" fill="none" stroke="url(#gearFill)" stroke-width="28"/>
      </g>

      <circle cx="258" cy="175" r="102" fill="#ffffff"/>

      <path
        d="M98 294 L43 321 L92 347 L80 326
           C88 258 114 202 153 158
           C201 104 271 76 346 82
           C372 84 395 65 397 39
           C399 13 380 -7 353 -8
           C259 -13 168 22 106 88
           C46 151 10 235 10 317 Z"
        fill="url(#goldFill)"
      />

      <circle cx="118" cy="154" r="7" fill="#1f1f1f"/>

      <g>
        <text
          x="82"
          y="295"
          fill="url(#redFill)"
          stroke="#f7f3ef"
          stroke-width="11"
          paint-order="stroke fill"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"
          font-weight="700"
          font-size="188"
        >O</text>
        <circle cx="139" cy="223" r="18" fill="#ffffff" stroke="#b7b7b7" stroke-width="2"/>
        <path d="M112 245 C124 251 132 239 145 245 C156 251 165 240 178 246 C188 250 196 244 203 240" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

        <text
          x="191"
          y="298"
          fill="url(#redFill)"
          stroke="#f7f3ef"
          stroke-width="11"
          paint-order="stroke fill"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"
          font-weight="700"
          font-size="204"
        >H</text>
      </g>
    </g>
  </g>
</svg>
